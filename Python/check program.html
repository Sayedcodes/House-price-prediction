<!-- check program -->

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Password Portal</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">

  <div class="bg-white shadow-lg rounded-xl p-8 w-full max-w-sm text-center">
    <h1 class="text-2xl font-bold mb-4">🔒 Secure Portal</h1>

    <input id="passwordInput" type="number" placeholder="Enter password" class="border p-2 rounded w-full mb-4 text-center" />

    <button id="submitBtn" class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600 w-full">
      Submit
    </button>

    <p id="message" class="mt-4 text-gray-700"></p>
  </div>

  <script>
    const correct_password = 10;
    let attempt = 0;
    const max_attempts = 5;

    const passwordInput = document.getElementById('passwordInput');
    const submitBtn = document.getElementById('submitBtn');
    const message = document.getElementById('message');

    submitBtn.addEventListener('click', () => {
      const password = parseInt(passwordInput.value);
      attempt++;

      if (password === correct_password) {
        message.textContent = "Login Successfully, Welcome!";
        message.className = "mt-4 text-green-600 font-bold";
        submitBtn.disabled = true;
        passwordInput.disabled = true;
      } else {
        if (attempt >= max_attempts) {
          message.textContent = "The portal has locked. Try again after a few minutes.";
          message.className = "mt-4 text-red-600 font-bold";
          submitBtn.disabled = true;
          passwordInput.disabled = true;
        } else {
          message.textContent = `Incorrect pin. Try again. (${max_attempts - attempt} attempts left)`;
          message.className = "mt-4 text-red-500";
        }
      }

      passwordInput.value = "";
      passwordInput.focus();
    });
  </script>

</body>
</html>
<!-- This code creates a simple password portal using HTML, Tailwind CSS, and JavaScript. 
     It allows users to enter a numeric password and provides feedback based on the input. -->
